<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datcor Agent Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .status-active { color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .status-busy { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        
        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
            display: inline-block;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-text { height: 1.2rem; width: 60px; }
        .skeleton-title { height: 1.5rem; width: 100%; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Datcor <span class="text-blue-500">Agent Panel</span></h1>
                <p class="text-slate-400">Моніторинг роботи AI-агентів у реальному часі</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm text-slate-400">Останнє оновлення (Київ)</p>
                    <p id="last-updated" class="font-mono text-blue-400"><span class="skeleton skeleton-text"></span></p>
                </div>
                <div class="h-10 w-10 rounded-full accent-gradient flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-robot text-white"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-blue-500/10 rounded-lg text-blue-500"><i class="fa-solid fa-check-double"></i></div>
                    <span class="text-green-400 text-xs font-bold">Active</span>
                </div>
                <p class="text-slate-400 text-sm">Завдань за сьогодні</p>
                <h3 id="tasks-today" class="text-2xl font-bold"><span class="skeleton skeleton-text"></span></h3>
            </div>
            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-green-500/10 rounded-lg text-green-500"><i class="fa-solid fa-signal"></i></div>
                    <span class="text-slate-400 text-xs font-bold">Stable</span>
                </div>
                <p class="text-slate-400 text-sm">Uptime агента</p>
                <h3 id="uptime" class="text-2xl font-bold"><span class="skeleton skeleton-text"></span></h3>
            </div>
            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-purple-500/10 rounded-lg text-purple-500"><i class="fa-solid fa-chart-line"></i></div>
                    <span class="text-blue-400 text-xs font-bold">Progress</span>
                </div>
                <p class="text-slate-400 text-sm">Контент-план (UA)</p>
                <h3 id="content-progress" class="text-2xl font-bold"><span class="skeleton skeleton-text"></span></h3>
            </div>
            <div class="glass-card p-6">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-amber-500/10 rounded-lg text-amber-500"><i class="fa-solid fa-envelope-open-text"></i></div>
                    <span class="text-green-400 text-xs font-bold">Active</span>
                </div>
                <p class="text-slate-400 text-sm">AgentMail Activity</p>
                <h3 id="mail-activity" class="text-2xl font-bold"><span class="skeleton skeleton-text"></span></h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-card p-6">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-microchip text-blue-500"></i> Статус агентів
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-slate-500 text-sm border-b border-slate-700">
                            <tr>
                                <th class="pb-4 font-medium">Агент</th>
                                <th class="pb-4 font-medium">Роль</th>
                                <th class="pb-4 font-medium">Статус</th>
                                <th class="pb-4 font-medium text-right">Завдань</th>
                            </tr>
                        </thead>
                        <tbody id="agent-table-body" class="text-sm">
                            <!-- Skeletons will be replaced by JS -->
                            <tr>
                                <td colspan="4" class="py-8 text-center text-slate-500">Завантаження даних...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-blue-500"></i> Лог активності
                </h3>
                <div id="activity-log" class="space-y-6">
                    <!-- Skeletons -->
                    <div class="flex gap-4 relative">
                        <div class="h-6 w-6 rounded-full bg-slate-700 flex items-center justify-center z-10"></div>
                        <div class="flex-1 space-y-2">
                            <div class="skeleton skeleton-text w-3/4"></div>
                            <div class="skeleton skeleton-text w-1/2"></div>
                        </div>
                    </div>
                    <div class="flex gap-4 relative">
                        <div class="h-6 w-6 rounded-full bg-slate-700 flex items-center justify-center z-10"></div>
                        <div class="flex-1 space-y-2">
                            <div class="skeleton skeleton-text w-2/3"></div>
                            <div class="skeleton skeleton-text w-1/3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updatePanel() {
            try {
                const response = await fetch('stats.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('last-updated').innerText = data.last_updated;
                document.getElementById('tasks-today').innerText = data.metrics.tasks_today;
                document.getElementById('uptime').innerText = data.metrics.uptime;
                document.getElementById('content-progress').innerText = data.metrics.content_progress;
                document.getElementById('mail-activity').innerText = data.metrics.agentmail_activity;
                
                const tableBody = document.getElementById('agent-table-body');
                tableBody.innerHTML = data.agents.map(a => \`
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                        <td class="py-4 font-semibold">\${a.name}</td>
                        <td class="py-4 text-slate-400">\${a.role}</td>
                        <td class="py-4"><span class="px-2 py-1 rounded-full text-xs font-bold \${a.status === 'Active' ? 'status-active' : 'status-busy'}">\${a.status}</span></td>
                        <td class="py-4 text-right font-mono">\${a.tasks}</td>
                    </tr>
                \`).join('');

                const logContainer = document.getElementById('activity-log');
                logContainer.innerHTML = data.logs.map((l, i) => \`
                    <div class="flex gap-4 relative">
                        \${i < data.logs.length - 1 ? '<div class="absolute left-3 top-6 bottom-0 w-px bg-slate-700"></div>' : ''}
                        <div class="h-6 w-6 rounded-full \${l.color} flex items-center justify-center z-10 shadow-lg shadow-blue-500/40">
                            <i class="fa-solid \${l.icon} text-[10px] text-white"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium">\${l.text}</p>
                            <p class="text-xs text-slate-500">\${l.source} • \${l.time}</p>
                        </div>
                    </div>
                \`).join('');
            } catch (e) {
                console.error('Error loading stats:', e);
                document.getElementById('last-updated').innerText = 'Помилка завантаження';
            }
        }
        updatePanel();
    </script>
</body>
</html>
